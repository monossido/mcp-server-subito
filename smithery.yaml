startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      ignoreRobotsTxt:
        type: boolean
        default: false
        description: "Disable robots.txt enforcement. Required to scan multiple pages. Use responsibly."
      allowUnknownRobots:
        type: boolean
        default: false
        description: "Advanced: if robots.txt is unreachable, proceed anyway instead of blocking the request."
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: [
        "-y",
        "mcp-server-subito",
        ...(config.ignoreRobotsTxt ? ["--ignore-robots-txt"] : []),
        ...(config.allowUnknownRobots ? ["--allow-unknown-robots"] : [])
      ]
    })
